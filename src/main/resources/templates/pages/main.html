<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
	<link rel="stylesheet" th:href="@{/css/style.css}">
	<title>bucketList</title>
</head>

<body>
	<header>
		<a th:href="@{/menu(order=${currentOrder})}">
			<svg xmlns="http://www.w3.org/2000/svg" width="23" height="23" fill="currentColor" class="bi bi-list"
				viewBox="0 0 16 16">
				<path fill-rule="evenodd"
					d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5">
				</path>
			</svg></a>
		<div th:text="|${completedTasks} / ${totalTasks}|">
			0/0
		</div>
		<a th:href="@{/edit}">
			<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-pencil-fill"
				viewBox="0 0 16 16">
				<path
					d="M12.854.146a.5.5 0 0 0-.707 0L10.5 1.793 14.207 5.5l1.647-1.646a.5.5 0 0 0 0-.708zm.646 6.061L9.793 2.5 3.293 9H3.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.207zm-7.468 7.468A.5.5 0 0 1 6 13.5V13h-.5a.5.5 0 0 1-.5-.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.5-.5V10h-.5a.5.5 0 0 1-.175-.032l-.179.178a.5.5 0 0 0-.11.168l-2 5a.5.5 0 0 0 .65.65l5-2a.5.5 0 0 0 .168-.11z">
				</path>
			</svg></a>
	</header>
	<section id="tasks">
		<ul>
			<li th:each="task : ${list}">
				<form method="post" th:action="@{/completed}">
					<input type="hidden" name="taskId" th:value="${task.taskId}">
					<button type="submit" class="task-button">
						<article class="task" th:classappend="${task.completed}?'is-done':''">
							<pre class="body" th:text="${task.body}"></pre>
						</article>
					</button>
				</form>
			</li>
		</ul>
	</section>

	<form method="post" action="#" th:action="@{/add}" th:object="${form}" id="footer-container">
		<div class="form-inner">
			<textarea th:field="*{body}" class="input-form"></textarea>
			<button type="submit" class="input-form">送信</button>
		</div>
	</form>
</body>

</html>
