<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<title>bucketList</title>
</head>

<body>
	<h2>編集ページ</h2>
	<a th:href="@{/main}">戻る</a>
	<section>
		<ul>
			<li th:each="task : ${list}">

				<article class="task">
					<form method="post" th:action="@{/delete}">
						<input type="hidden" th:value="${task.taskId}" name="taskId">
						<button type="submit">削除</button>
					</form>
					<form method="post" th:action="@{/update}">
						<input type="hidden" name="taskId" th:value="${task.taskId}">
						<textarea class="body" name="body" th:text="${task.body}"></textarea>
						<button type="submit">確定</button>
					</form>
				</article>
			</li>
		</ul>
	</section>

	<form method="post" action="#" th:action="@{/add}" th:object="${form}">
		<section id="form">
			<div><textarea th:field="*{body}"></textarea></div>
			<button type="submit">送信</button>
		</section>
	</form>
</body>

</html>
