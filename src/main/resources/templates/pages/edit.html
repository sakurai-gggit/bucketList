<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
	<link rel="stylesheet" th:href="@{/css/style.css}">
	<title>bucketList</title>
</head>

<body>
	<header class="header-edit">
		<a th:href="@{/main}" class="bi-pencil">
			<svg xmlns="http://www.w3.org/2000/svg" width="23" height="23" fill="currentColor" class="bi"
				viewBox="0 0 16 16">
				<path
					d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325" />
			</svg>
		</a>
	</header>
	<section id="tasks">
		<ul>
			<li th:each="task : ${list}">

				<article class="task-row">
					<form method="post" th:action="@{/delete}">
						<input type="hidden" th:value="${task.taskId}" name="taskId">
						<button type="submit">
							<svg xmlns="http://www.w3.org/2000/svg" width="23" height="23" fill="currentColor"
								class="bi bi-trash" viewBox="0 0 16 16">
								<path
									d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z" />
								<path
									d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM2.5 3h11V2h-11z" />
							</svg>
						</button>
					</form>
					<form method="post" th:action="@{/update}" class="edit-task">
						<input type="hidden" name="taskId" th:value="${task.taskId}">
						<textarea name="body" th:text="${task.body}" onblur="this.form.submit()"></textarea>
					</form>
				</article>
			</li>
		</ul>
	</section>

	<form method="post" action="#" th:action="@{/add}" th:object="${form}" id="footer-container">
		<div class="form-inner">
			<textarea th:field="*{body}" class="input-form"></textarea>
			<button type="submit" class="input-form">送信</button>
		</div>
	</form>
</body>

</html>
