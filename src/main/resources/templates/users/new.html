<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
	<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
	<title>bucketList</title>
</head>

<body>
	<main class="top-contents">
		<div class="top-wrapper">
			<h2>create</h2>
			<form method="post" th:action="@{/user}" th:object="${form}">
				<div class="row">
					<label for="user_email">Email</label>
					<input type="text" class="input-text" th:field="*{email}" />
				</div>
				<p th:if="${#fields.hasErrors('email')}" class="error-message" th:errors="*{email}"></p>

				<div class="row">
					<label for="user_password">Password</label>
					<input class="input-text" type="password" th:field="*{password}" />
				</div>
				<p th:if="${#fields.hasErrors('password')}" class="error-message" th:errors="*{password}">
				</p>

				<div class="row">
					<label for="user_password_confirmation" class="row-password">
						Password
						<span>(確認)</span></label>
					<input type="password" class="input-text" th:field="*{passwordConfirmation}" />
				</div>
				<p th:if="${#fields.hasErrors('passwordConfirmation')}" class="error-message"
					th:errors="*{passwordConfirmation}"></p>

				<input type="submit" value="登録" class="top-button" />
			</form>
		</div>
	</main>
</body>

</html>
